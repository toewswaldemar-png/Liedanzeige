<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Hintergrund: warmes Weiß -->
  <rect width="256" height="256" rx="52" fill="#fafafa"/>

  <!-- Äußerer Ring -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="none" stroke="#e0e0e0" stroke-width="4"/>

  <!-- Farbiger oberer Balken -->
  <rect x="0" y="0" width="256" height="72" rx="52" fill="#26a69a"/>
  <rect x="0" y="40" width="256" height="32" fill="#26a69a"/>

  <!-- Header-Text -->
  <text x="128" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="8">LIED</text>

  <!-- Erste Zahlenzeile -->
  <rect x="28" y="88" width="200" height="58" rx="12" fill="#e0f2f1"/>
  <text x="128" y="132" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="800" fill="#00695c" text-anchor="middle" letter-spacing="8">123</text>

  <!-- Zweite Zahlenzeile -->
  <rect x="28" y="156" width="200" height="58" rx="12" fill="#f5f5f5"/>
  <text x="128" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="800" fill="#b2dfdb" text-anchor="middle" letter-spacing="8">456</text>
